<!DOCTYPE html>
<html>

<head>

<title>Sales Prediction</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding-top:80px;
}

.container{
background:white;
width:380px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
padding:10px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.result{
margin-top:20px;
font-size:22px;
color:blue;
}

</style>

</head>

<body>

<div class="container">

<h2>Advertising Sales Prediction</h2>

<form action="/predict" method="post">

<input type="number" step="any" name="tv" placeholder="Enter TV Budget" required><br>

<input type="number" step="any" name="radio" placeholder="Enter Radio Budget" required><br>

<input type="number" step="any" name="newspaper" placeholder="Enter Newspaper Budget" required><br>

<button type="submit">Predict Sales</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>

</html>
