<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #020617;
            border-radius: 16px;
            padding: 32px 28px;
            box-shadow: 0 24px 80px rgba(15,23,42,0.9);
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(148,163,184,0.2);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
            color: #f9fafb;
        }
        p.subtitle {
            margin: 0 0 24px;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #e5e7eb;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #4b5563;
            background: #020617;
            color: #f9fafb;
            font-size: 0.9rem;
            box-sizing: border-box;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 1px #6366f1;
        }
        .field {
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 10px 14px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            margin-top: 8px;
            font-size: 0.95rem;
        }
        button:hover {
            filter: brightness(1.05);
        }
        button:active {
            transform: translateY(1px);
        }
        .result {
            margin-top: 18px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.4);
            color: #bbf7d0;
            font-size: 0.9rem;
        }
        .hint {
            margin-top: 12px;
            font-size: 0.78rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sales Prediction</h1>
        <p class="subtitle">Enter the advertising budget for each channel to estimate sales.</p>
        <form action="/predict" method="POST">
            <div class="field">
                <label for="tv">TV Spend</label>
                <input type="number" step="0.01" min="0" name="tv" id="tv" required>
            </div>
            <div class="field">
                <label for="radio">Radio Spend</label>
                <input type="number" step="0.01" min="0" name="radio" id="radio" required>
            </div>
            <div class="field">
                <label for="newspaper">Newspaper Spend</label>
                <input type="number" step="0.01" min="0" name="newspaper" id="newspaper" required>
            </div>
            <button type="submit">Predict Sales</button>
        </form>
        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
        <div class="hint">
            Model loaded from <code>sales_model.pkl</code>.
        </div>
    </div>
</body>
</html>
